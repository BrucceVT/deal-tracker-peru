<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deal Tracker Perú</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0f1115" />
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --accent: #ff5c39;
    --text: #eef0f3;
    --muted: #8b93a1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #22262f;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 { font-size: 1.15rem; margin: 0; }
  header h1 span { color: var(--accent); }
  button#enable-push {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  button#enable-push:disabled { opacity: 0.5; cursor: default; }
  main { padding: 16px; max-width: 720px; margin: 0 auto; }
  .deal-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    text-decoration: none;
    color: var(--text);
    border: 1px solid #22262f;
  }
  .deal-card img {
    width: 64px; height: 64px; object-fit: contain;
    background: white; border-radius: 8px; flex-shrink: 0;
  }
  .deal-info { flex: 1; min-width: 0; }
  .deal-title {
    font-size: 0.92rem; font-weight: 600; margin: 0 0 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .deal-meta { font-size: 0.8rem; color: var(--muted); }
  .deal-price { color: var(--accent); font-weight: 700; }
  .deal-store {
    display: inline-block; font-size: 0.7rem; text-transform: uppercase;
    background: #22262f; padding: 2px 8px; border-radius: 10px; margin-right: 6px;
  }
  .empty { color: var(--muted); text-align: center; margin-top: 60px; font-size: 0.9rem; }
</style>
</head>
<body>
  <header>
    <h1>Deal<span>Tracker</span> 🇵🇪</h1>
    <button id="enable-push">Activar avisos</button>
  </header>
  <main id="deals-list">
    <p class="empty">Cargando ofertas…</p>
  </main>

<script>
async function loadDeals() {
  const res = await fetch("/api/deals?limit=50");
  const deals = await res.json();
  const container = document.getElementById("deals-list");

  if (!deals.length) {
    container.innerHTML = '<p class="empty">Todavía no se ha detectado ninguna oferta. El tracker sigue escaneando en segundo plano.</p>';
    return;
  }

  container.innerHTML = deals.map(d => `
    <a class="deal-card" href="${d.url}" target="_blank" rel="noopener">
      <img src="${d.image_url || ''}" onerror="this.style.display='none'" />
      <div class="deal-info">
        <p class="deal-title">${d.title}</p>
        <div class="deal-meta">
          <span class="deal-store">${d.store}</span>
          <span class="deal-price">S/ ${d.price_at_alert.toFixed(2)}</span>
          · score ${d.score}
        </div>
      </div>
    </a>
  `).join("");
}

loadDeals();
setInterval(loadDeals, 30000);

// --- Web Push ---
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function enablePush() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    alert("Este navegador no soporta notificaciones push.");
    return;
  }
  const reg = await navigator.serviceWorker.register("/sw.js");
  const permission = await Notification.requestPermission();
  if (permission !== "granted") return;

  const keyRes = await fetch("/api/vapid-public-key");
  const { key } = await keyRes.json();
  if (!key) {
    alert("El servidor todavía no tiene configurada la llave VAPID (ver README).");
    return;
  }

  const sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(key),
  });

  await fetch("/api/push/subscribe", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(sub),
  });

  document.getElementById("enable-push").textContent = "Avisos activados ✓";
  document.getElementById("enable-push").disabled = true;
}

document.getElementById("enable-push").addEventListener("click", enablePush);
</script>
</body>
</html>
