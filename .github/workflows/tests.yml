name: Tests

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        # Los tests no lanzan browsers (usan MockTransport), así que no hace
        # falta `playwright install` — solo el paquete de Python.
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
