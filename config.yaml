# ============================================================
# Configuración del Deal Tracker
# ============================================================

# Cada cuánto se revisa cada tienda (segundos).
# NO poner valores muy bajos (<20s) o te van a bloquear la IP.
scan_interval:
  falabella: 45
  ripley: 45
  plazavea: 60
  oechsle: 60
  linio: 90

# Palabras clave que definen "sector tecnología" (para filtrar productos)
keywords:
  - laptop
  - notebook
  - computadora
  - pc gamer
  - all in one
  - monitor
  - televisor
  - smart tv
  - teléfono
  - smartphone
  - celular
  - tablet
  - audífonos
  - tarjeta gráfica
  - procesador
  - ssd
  - disco duro

# Palabras que, si aparecen en el título, EXCLUYEN el producto de todo el
# análisis. Dos grupos:
#   1. Accesorios mucho más baratos que el producto real que calzan por texto
#      dentro del price_ceiling ("mochila para laptop" a S/59 no es una
#      "laptop barata").
#   2. Productos legítimamente baratos que NO son errores de precio:
#      reacondicionados (S/899-1139 es su precio normal) y chromebooks
#      (S/500-700 nuevos es normal).
exclude_keywords:
  - mochila
  - funda
  - case
  - forro
  - protector
  - cooler
  - cooler pad
  - base para laptop
  - cargador
  - cable
  - adaptador
  - soporte
  - teclado
  - mouse
  - parlante
  - repuesto
  - accesorio
  - reacondicionado
  - reacondicionada
  - refurbished
  - chromebook

# Rango de "error de precio" por categoría (soles): floor..ceiling.
# FILOSOFÍA (2026-07-19, pedido del usuario): esto NO es para descuentos
# comunes — es para cazar errores tipo "laptop buena a S/475". Por eso el
# ceiling está POR DEBAJO del precio mínimo normal de mercado del producto
# nuevo más barato de la categoría (medido con datos reales de las 4 tiendas):
#   laptop nueva más barata real  ~S/1,800  -> error si <= 900
#   televisor más barato real     ~S/369    -> error si <= 300
#   smartphone más barato real    ~S/329    -> error si <= 280
#   tablet más barata real        ~S/300    -> error si <= 250
# Un precio dentro de este rango ES un error casi seguro, así que la señal
# puede disparar alerta ELLA SOLA (en errores de precio la tienda muchas
# veces ni muestra precio tachado). El floor filtra accesorios mal detectados.
price_ceiling:
  laptop: {floor: 300, ceiling: 900}
  televisor: {floor: 100, ceiling: 300}
  smartphone: {floor: 100, ceiling: 280}
  tablet: {floor: 80, ceiling: 250}
  monitor: {floor: 80, ceiling: 250}

# --- Motor de decisión: combinación de señales ---
# Un producto se considera OFERTA si su score >= min_score.
# score = suma ponderada de señales activadas (ver core/deal_engine.py)
# Calibrado para ERRORES DE PRECIO, no ofertas comunes: cada una de las 3
# señales fuertes (descuento >=80%, rango de error, caída histórica >=60%)
# pesa 2.0 y puede disparar sola. below_historical_min es solo un refuerzo.
deal_engine:
  min_score: 2.0
  weights:
    discount_pct_high: 2.0      # descuento >= discount_pct_threshold (drástico)
    below_price_ceiling: 2.0    # precio en el rango de "error" de su categoría
    below_historical_min: 0.5   # refuerzo: es el precio más bajo jamás visto
    below_historical_avg_pct: 2.0  # caída drástica vs promedio histórico propio
  discount_pct_threshold: 80      # % mínimo de descuento (el usuario no quiere <80%)
  historical_avg_pct_threshold: 60  # % mínimo de caída bajo el promedio histórico

# --- Notificaciones ---
notifications:
  discord:
    enabled: true
    webhook_url: "https://discord.com/api/webhooks/TU_WEBHOOK_AQUI"
  telegram:
    enabled: true
    bot_token: "TU_BOT_TOKEN_AQUI"
    chat_id: "TU_CHAT_ID_AQUI"
  webpush:
    enabled: true
    vapid_public_key: ""   # generado con scripts/generate_vapid_keys.py
    vapid_private_key: ""
    vapid_claims_email: "mailto:tu_correo@example.com"

# --- Tiendas activas ---
stores:
  falabella:
    enabled: true
    base_url: "https://www.falabella.com.pe"
    categories:
      - "https://www.falabella.com.pe/falabella-pe/category/cat40712/Laptops"
      - "https://www.falabella.com.pe/falabella-pe/category/cat50678/Computadoras"
  ripley:
    enabled: true
    base_url: "https://simple.ripley.com.pe"
    categories:
      # "computo" ya no existe (devolvía 404) -> corregido a "computacion" (2026-07-19)
      - "https://simple.ripley.com.pe/tecnologia/computacion/laptops"
  plazavea:
    enabled: true
    base_url: "https://www.plazavea.com.pe"
    categories:
      - "https://www.plazavea.com.pe/tecnologia/computo"
  oechsle:
    enabled: true
    base_url: "https://www.oechsle.pe"
    categories:
      - "https://www.oechsle.pe/tecnologia"
  linio:
    enabled: false
    base_url: "https://www.linio.com.pe"
    categories: []
