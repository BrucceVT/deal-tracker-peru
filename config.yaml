# ============================================================
# Configuración del Deal Tracker
# ============================================================

# Cada cuánto se revisa cada tienda (segundos). Solo aplica al modo loop
# (local/VPS); en GitHub Actions el ritmo lo pone el cron del workflow.
# NO poner valores muy bajos (<20s) o te van a bloquear la IP.
scan_interval:
  falabella: 45
  ripley: 45
  plazavea: 60
  oechsle: 60
  coolbox: 60
  promart: 60
  metro: 60
  wong: 60

# Palabras clave que definen "sector tecnología" (para filtrar productos)
keywords:
  - laptop
  - notebook
  - computadora
  - pc gamer
  - all in one
  - monitor
  - televisor
  - smart tv
  - teléfono
  - smartphone
  - celular
  - tablet
  - audífonos
  - tarjeta gráfica
  - procesador
  - ssd
  - disco duro

# Palabras que, si aparecen en el título, EXCLUYEN el producto de todo el
# análisis. Dos grupos:
#   1. Accesorios mucho más baratos que el producto real que calzan por texto
#      dentro del price_ceiling ("mochila para laptop" a S/59 no es una
#      "laptop barata").
#   2. Productos legítimamente baratos que NO son errores de precio:
#      reacondicionados (S/899-1139 es su precio normal) y chromebooks
#      (S/500-700 nuevos es normal).
exclude_keywords:
  - mochila
  - funda
  - case
  - forro
  - protector
  - cooler
  - cooler pad
  - base para laptop
  - cargador
  - cable
  - adaptador
  - soporte
  - teclado
  - mouse
  - parlante
  - repuesto
  - accesorio
  - reacondicionado
  - reacondicionada
  - refurbished
  - chromebook
  # Productos infantiles / de gama ultra-básica: su precio normal es tan bajo
  # que caería dentro de los rangos de error (visto en vivo con la red ampliada
  # de tiendas el 2026-07-19: "Tablet Advance KIDs a S/99" no es un error).
  - kids
  - niños
  - niñas
  - básico
  - basico

# --- (Eliminado 2026-07-20) Rangos de "error de precio" por categoría ---
# Antes había un `price_ceiling: {categoria: {floor, ceiling}}` que alertaba si
# un precio caía bajo un umbral absoluto. Se ELIMINÓ para TODAS las categorías a
# pedido del usuario: "no me sirven equipos que de por sí ya son baratos porque
# normalmente son malos". Un precio bajo en sí mismo ya no es señal — puede ser
# gama de entrada legítima (caso real: "ZTE Blade A35E a S/269"). Ahora el motor
# solo mira la CAÍDA DRÁSTICA (>=80%) sobre un producto que normalmente es CARO,
# medida vs el precio tachado o vs el promedio histórico. Ver deal_engine abajo.

# --- Motor de decisión: combinación de señales ---
# Un producto se considera OFERTA si su score >= min_score.
# score = suma ponderada de señales activadas (ver core/deal_engine.py).
#
# FILOSOFÍA (recalibrado 2026-07-20): errores de precio en productos CAROS —
# una caída drástica (>=80%) de su precio real. Primero un GATE: si el producto
# no supera min_reference_price (su precio de lista tachado o su promedio
# histórico), se descarta sin evaluar señales.
#
# CASO REAL que forzó este ajuste (2026-07-20): "TABLET XIAOMI REDMI PAD 2
# 256GB | LAVANDA" en Plaza Vea, precio S/949 "antes S/10,000" (91% dto.) —
# alertó 4 veces en producción. El mismo vendedor repite el idéntico truco
# ("antes S/10,000") en OTRO producto distinto ("POCO PAD M1"). El precio
# tachado nunca cambia entre escaneos porque lo controla el vendedor, no
# nosotros: es dato 100% falsificable, a diferencia del promedio histórico que
# el propio tracker mide con observaciones repetidas.
#
# Por eso `discount_pct_high` (descuento tachado) YA NO dispara alerta ni sola
# ni combinada con el refuerzo débil de mínimo histórico (1.0 + 0.5 = 1.5,
# sigue por debajo de min_score) — esa combinación dejaba una rendija abierta
# para el mismo fraude si el precio del vendedor fluctúa un poco. Solo sirve
# como confirmación adicional quando la caída histórica real YA calificó sola.
# La ÚNICA señal ANCLA (dispara sola, peso 2.0) es la caída >=80% vs el
# promedio histórico propio — no se puede falsificar porque la mide el tracker.
deal_engine:
  min_score: 2.0
  min_reference_price: 800  # piso de "producto caro": bajo esto ni se evalúa
  weights:
    discount_pct_high: 1.0      # descuento tachado — refuerzo débil, nunca alcanza min_score ni combinado con below_historical_min
    below_historical_min: 0.5   # refuerzo: es el precio más bajo jamás visto
    below_historical_avg_pct: 2.0  # caída >=80% vs promedio histórico — ÚNICA ANCLA
  discount_pct_threshold: 80      # % mínimo de descuento tachado (solo como refuerzo)
  historical_avg_pct_threshold: 80  # % mínimo de caída bajo el promedio histórico

# --- Notificaciones ---
notifications:
  discord:
    enabled: true
    webhook_url: "https://discord.com/api/webhooks/TU_WEBHOOK_AQUI"
  telegram:
    enabled: true
    bot_token: "TU_BOT_TOKEN_AQUI"
    chat_id: "TU_CHAT_ID_AQUI"
  webpush:
    enabled: true
    vapid_public_key: ""   # generado con scripts/generate_vapid_keys.py
    vapid_private_key: ""
    vapid_claims_email: "mailto:tu_correo@example.com"

# --- Tiendas activas ---
# Todas las URLs de categoría fueron validadas en vivo el 2026-07-19 con los
# scrapers reales (ver docs/PLAN.md, Fase 6).
stores:
  falabella:
    enabled: true
    base_url: "https://www.falabella.com.pe"
    categories:
      - "https://www.falabella.com.pe/falabella-pe/category/cat40712/Laptops"
      - "https://www.falabella.com.pe/falabella-pe/category/cat50678/Computadoras"
      - "https://www.falabella.com.pe/falabella-pe/category/cat210477/TV-Televisores"
      - "https://www.falabella.com.pe/falabella-pe/category/cat760706/Celulares-y-Telefonos"
      - "https://www.falabella.com.pe/falabella-pe/category/cat270476/Tablets"
      - "https://www.falabella.com.pe/falabella-pe/category/cat40695/Monitores"
  ripley:
    # Solo aporta en ejecución local/VPS: Cloudflare bloquea el browser
    # headless desde las IPs de datacenter de GitHub Actions.
    enabled: true
    base_url: "https://simple.ripley.com.pe"
    categories:
      # "computo" ya no existe (devolvía 404) -> corregido a "computacion" (2026-07-19)
      - "https://simple.ripley.com.pe/tecnologia/computacion/laptops"
  plazavea:
    enabled: true
    base_url: "https://www.plazavea.com.pe"
    categories:
      - "https://www.plazavea.com.pe/tecnologia/computo"
      - "https://www.plazavea.com.pe/tecnologia/televisores"
      - "https://www.plazavea.com.pe/tecnologia/celulares"
      - "https://www.plazavea.com.pe/tecnologia/tablets"
  oechsle:
    enabled: true
    base_url: "https://www.oechsle.pe"
    categories:
      - "https://www.oechsle.pe/tecnologia/computo"
      - "https://www.oechsle.pe/tecnologia/televisores"
      - "https://www.oechsle.pe/tecnologia/celulares"
  coolbox:
    enabled: true
    base_url: "https://www.coolbox.pe"
    categories:
      - "https://www.coolbox.pe/tecnologia"
  promart:
    enabled: true
    base_url: "https://www.promart.pe"
    categories:
      - "https://www.promart.pe/tecnologia"
  metro:
    enabled: true
    base_url: "https://www.metro.pe"
    categories:
      - "https://www.metro.pe/tecnologia"
  wong:
    # Deshabilitado: comparte catálogo con Metro (ambos Cencosud) y
    # duplicaría las alertas del mismo error de precio.
    enabled: false
    base_url: "https://www.wong.pe"
    categories:
      - "https://www.wong.pe/tecnologia"
